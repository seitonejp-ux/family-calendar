<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Family Cal" />
<title>Family Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --work-color: #185FA5;
  --work-bg: #dbeafe;
  --work-text: #1e40af;
  --private-color: #3B6D11;
  --private-bg: #dcfce7;
  --private-text: #166534;
  --kids-color: #b45309;
  --kids-bg: #fef3c7;
  --kids-text: #92400e;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #f2f2f7;
  color: #1a1a1a;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.shell {
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: calc(32px + var(--safe-bottom));
}

/* ── Header ── */
.header {
  background: #fff;
  padding: 12px 16px 0;
  padding-top: calc(12px + var(--safe-top));
  border-bottom: 1px solid #e5e7eb;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.add-btn {
  width: 36px; height: 36px;
  background: #185FA5; color: #fff;
  border: none; border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.add-btn:active { transform: scale(0.92); background: #144f8c; }

/* ── Tab bar ── */
.tabbar {
  display: flex; gap: 2px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 1px;
}
.tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 9px 14px;
  border-radius: 8px 8px 0 0;
  font-size: 14px; font-weight: 500;
  cursor: pointer; border: none;
  background: transparent; color: #6b7280;
  white-space: nowrap; font-family: inherit;
  border-bottom: 2px solid transparent;
}
.tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }
.tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Toggles ── */
.toggles-bar {
  background: #fff; padding: 10px 16px;
  display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid #e5e7eb;
}
.toggle-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid transparent;
  transition: opacity 0.15s; user-select: none;
}
.toggle-pill.off { opacity: 0.35; }
.toggle-pill:active { transform: scale(0.95); }

/* ── Calendar card ── */
.cal-card {
  background: #fff; margin: 12px 12px 0;
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
}
.month-label { font-size: 17px; font-weight: 700; }
.nav-btns { display: flex; gap: 4px; align-items: center; }
.nav-arrow {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid #e5e7eb; background: transparent;
  cursor: pointer; font-size: 15px; color: #374151;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.nav-arrow:active { background: #f3f4f6; }
.today-pill {
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid #e5e7eb; background: transparent;
  font-size: 12px; font-weight: 500; color: #374151;
  cursor: pointer; font-family: inherit;
}
.today-pill:active { background: #f3f4f6; }

/* ── Grid ── */
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 4px 10px; gap: 2px;
}
.day-head {
  text-align: center; font-size: 11px; font-weight: 600;
  color: #9ca3af; padding: 4px 0; letter-spacing: 0.05em;
}
.cal-cell {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 2px; cursor: pointer; border-radius: 10px;
  min-height: 52px; transition: background 0.1s;
}
.cal-cell:active { background: #f3f4f6; }
.cal-cell.selected { background: #eff6ff; }
.d-num {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 14px; font-weight: 500;
  color: #374151;
}
.cal-cell.other-month .d-num { color: #d1d5db; }
.cal-cell.today .d-num { background: #185FA5; color: #fff; font-weight: 700; }
.cal-cell.selected:not(.today) .d-num { background: #dbeafe; color: #185FA5; }
.dot-row {
  display: flex; gap: 2px; justify-content: center;
  flex-wrap: wrap; margin-top: 2px; max-width: 36px;
}
.ev-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── Day panel ── */
.day-panel {
  background: #fff; margin: 8px 12px 0;
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.day-panel-header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.day-panel-title { font-size: 15px; font-weight: 700; }
.day-panel-add {
  display: flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid #e5e7eb;
  border-radius: 20px; padding: 5px 12px;
  font-size: 13px; color: #374151; cursor: pointer;
  font-family: inherit;
}
.day-panel-add:active { background: #f3f4f6; }

.ev-list { padding: 0 12px 12px; }
.ev-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; border-radius: 10px;
  cursor: pointer; margin-bottom: 4px;
}
.ev-row:active { background: #f9fafb; }
.ev-bar {
  width: 4px; border-radius: 3px;
  align-self: stretch; min-height: 38px; flex-shrink: 0;
}
.ev-info { flex: 1; min-width: 0; }
.ev-title { font-size: 15px; font-weight: 600; }
.ev-meta { font-size: 13px; color: #9ca3af; margin-top: 2px; }
.ev-badge {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px; margin-top: 4px;
  display: inline-block;
}
.no-events { text-align: center; padding: 24px 16px; color: #9ca3af; font-size: 14px; }
.no-events i { font-size: 28px; display: block; margin-bottom: 8px; }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 1000; padding-bottom: var(--safe-bottom);
  backdrop-filter: blur(2px);
}
@media (min-width: 501px) {
  .overlay { align-items: center; }
  .modal { border-radius: 16px !important; margin: 0 auto; }
}
.modal {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px;
  padding: 0 0 8px; max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.22s cubic-bezier(0.34,1.26,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-handle {
  width: 36px; height: 4px; background: #e5e7eb;
  border-radius: 2px; margin: 12px auto 4px;
}
.modal-inner { padding: 4px 20px 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: #9ca3af; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e5e7eb; border-radius: 12px;
  font-size: 16px; font-family: inherit; color: #1a1a1a;
  background: #f9fafb; outline: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: #185FA5; background: #fff;
  box-shadow: 0 0 0 3px rgba(24,95,165,0.1);
}
.field textarea { resize: none; min-height: 80px; font-size: 15px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.cat-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cat-option {
  border: 2px solid #e5e7eb; border-radius: 12px;
  padding: 12px 8px; cursor: pointer; text-align: center;
  background: transparent; font-family: inherit;
}
.cat-option:active { transform: scale(0.96); }
.cat-dot { width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 6px; }
.cat-name { font-size: 13px; font-weight: 600; color: #374151; }
.cat-option.sel-work    { border-color: var(--work-color);    background: var(--work-bg); }
.cat-option.sel-private { border-color: var(--private-color); background: var(--private-bg); }
.cat-option.sel-kids    { border-color: var(--kids-color);    background: var(--kids-bg); }

.btn-save {
  width: 100%; padding: 15px;
  background: #185FA5; color: #fff;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-top: 6px;
}
.btn-save:active { background: #144f8c; transform: scale(0.98); }
.btn-delete-row { text-align: center; margin-top: 12px; }
.btn-delete {
  background: transparent; border: none;
  color: #ef4444; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit; padding: 8px 20px;
}
.btn-cancel-row { text-align: center; margin-top: 4px; }
.btn-cancel {
  background: transparent; border: none;
  color: #6b7280; font-size: 15px;
  cursor: pointer; font-family: inherit; padding: 8px 20px;
}

.toast {
  position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 14px; font-weight: 500;
  z-index: 2000; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Desktop: wider layout */
@media (min-width: 501px) {
  .shell { max-width: 780px; padding-bottom: 2rem; }
  .cal-cell { min-height: 80px; }
  .ev-dot { width: 6px; height: 6px; }
  .day-panel, .cal-card { margin: 12px 16px 0; }
}

/* ── MBTI Personality Quiz ── */
.brain-btn { width:36px; height:36px; background:#eff6ff; color:#185FA5; border:none; border-radius:50%; cursor:pointer; margin-right:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.brain-btn:active { background:#dbeafe; }
.mbti-overlay { position:fixed; inset:0; background:#fff; z-index:2000; display:flex; flex-direction:column; overflow:hidden; }
.mbti-screen { flex:1; display:flex; flex-direction:column; min-height:0; }
#mbti-s-welcome, #mbti-s-result { overflow-y:auto; -webkit-overflow-scrolling:touch; }
#mbti-s-quiz { overflow:hidden; }
/* Welcome */
.mbti-welcome-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 28px; padding-top:calc(48px + var(--safe-top)); text-align:center; }
.mbti-w-icon { font-size:52px; line-height:1; margin-bottom:16px; }
.mbti-w-h { font-size:22px; font-weight:800; color:#1a1a1a; margin-bottom:10px; }
.mbti-w-p { font-size:14px; color:#6b7280; line-height:1.7; margin-bottom:6px; }
.mbti-w-resume { font-size:13px; color:#185FA5; font-weight:600; background:#eff6ff; padding:8px 16px; border-radius:20px; margin:8px 0 16px; display:inline-block; }
.mbti-w-gap { height:16px; }
.mbti-btn-primary { width:100%; max-width:300px; padding:15px; background:#185FA5; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-bottom:10px; }
.mbti-btn-primary:active { background:#144f8c; transform:scale(0.98); }
.mbti-btn-ghost { background:transparent; border:none; color:#9ca3af; font-size:14px; cursor:pointer; font-family:inherit; padding:10px 16px; display:block; }
/* Quiz Header */
.mbti-q-hd { display:flex; align-items:center; gap:10px; padding:12px 16px; padding-top:calc(12px + var(--safe-top)); border-bottom:1px solid #f3f4f6; flex-shrink:0; }
.mbti-x { width:30px; height:30px; background:#f3f4f6; border:none; border-radius:50%; cursor:pointer; font-size:13px; color:#6b7280; display:flex; align-items:center; justify-content:center; font-family:inherit; }
.mbti-x:active { background:#e5e7eb; }
.mbti-prog { flex:1; height:6px; background:#f3f4f6; border-radius:3px; }
.mbti-prog-f { height:6px; border-radius:3px; background:#185FA5; transition:width 0.3s; }
.mbti-cnt { font-size:12px; color:#9ca3af; font-weight:600; min-width:38px; text-align:right; }
/* Question body */
.mbti-q-body { flex:1; padding:28px 20px 16px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
@keyframes mbtiIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.mbti-q-anim { animation:mbtiIn 0.18s ease; }
.mbti-q-lbl { font-size:11px; font-weight:700; color:#185FA5; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; }
.mbti-q-txt { font-size:17px; font-weight:600; line-height:1.75; color:#1a1a1a; }
/* Scale */
.mbti-scale-area { padding:20px 20px 0; flex-shrink:0; }
.mbti-scale-ends { display:flex; justify-content:space-between; font-size:11px; color:#9ca3af; margin-bottom:10px; }
.mbti-scale-row { display:flex; gap:8px; }
.mbti-s-btn { flex:1; aspect-ratio:1; max-width:58px; border:2px solid #e5e7eb; border-radius:50%; background:transparent; cursor:pointer; font-size:14px; font-weight:700; color:#9ca3af; display:flex; align-items:center; justify-content:center; transition:all 0.12s; font-family:inherit; }
.mbti-s-btn:active { transform:scale(0.85); }
.mbti-s-btn.sel { background:#185FA5; border-color:#185FA5; color:#fff; box-shadow:0 2px 8px rgba(24,95,165,0.35); }
/* Quiz footer */
.mbti-q-ft { display:flex; gap:10px; padding:14px 20px; padding-bottom:calc(14px + var(--safe-bottom)); border-top:1px solid #f3f4f6; flex-shrink:0; }
.mbti-nav { flex:1; padding:13px; border-radius:12px; border:1.5px solid #e5e7eb; background:transparent; color:#374151; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
.mbti-nav:active { background:#f3f4f6; }
.mbti-nav.pri { background:#185FA5; border-color:#185FA5; color:#fff; }
.mbti-nav.pri:active { background:#144f8c; }
.mbti-nav:disabled { opacity:0.3; pointer-events:none; }
/* Result */
.mbti-res-body { padding:20px; padding-top:calc(20px + var(--safe-top)); padding-bottom:calc(20px + var(--safe-bottom)); }
.mbti-res-top { display:flex; justify-content:flex-end; margin-bottom:8px; }
.mbti-type-card { background:linear-gradient(135deg,#185FA5,#1d4ed8); border-radius:20px; padding:32px 24px; text-align:center; color:#fff; margin-bottom:20px; }
.mbti-type-4 { font-size:52px; font-weight:900; letter-spacing:8px; line-height:1; margin-bottom:6px; }
.mbti-type-nm { font-size:19px; font-weight:700; margin-bottom:6px; }
.mbti-type-tl { font-size:13px; opacity:0.82; line-height:1.5; }
.mbti-sec-h { font-size:11px; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:0.08em; margin:20px 0 12px; }
.mbti-dim { margin-bottom:12px; }
.mbti-dim-hd { display:flex; justify-content:space-between; margin-bottom:5px; }
.mbti-dim-lbl { font-size:13px; font-weight:500; color:#9ca3af; }
.mbti-dim-lbl.w { font-weight:700; color:#1a1a1a; }
.mbti-dim-bar { background:#f3f4f6; border-radius:4px; height:8px; overflow:hidden; margin-bottom:3px; }
.mbti-dim-bar-f { height:8px; border-radius:4px; background:#185FA5; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.mbti-dim-pcts { display:flex; justify-content:space-between; font-size:11px; color:#9ca3af; }
.mbti-desc-card { background:#f9fafb; border-radius:14px; padding:16px; font-size:14px; color:#374151; line-height:1.8; }
.mbti-res-btns { display:flex; gap:10px; margin-top:20px; }
.mbti-btn-retake { flex:1; padding:14px; border-radius:12px; border:1.5px solid #e5e7eb; background:transparent; color:#374151; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
.mbti-btn-retake:active { background:#f3f4f6; }
.mbti-btn-close2 { flex:1; padding:14px; border-radius:12px; background:#185FA5; border:none; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
.mbti-btn-close2:active { background:#144f8c; }
.mbti-tags { display:flex; flex-wrap:wrap; gap:8px; }
.mbti-tag { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }
.mbti-tag.str { background:#dcfce7; color:#166534; }
.mbti-tag.wkn { background:#fee2e2; color:#991b1b; }
.mbti-tag.job { background:#eff6ff; color:#1e40af; }
.mbti-rel-text { font-size:14px; color:#374151; line-height:1.8; background:#f9fafb; border-radius:14px; padding:14px; }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="header-top">
      <div class="app-title">Family Calendar</div>
      <button class="brain-btn" id="btn-mbti" aria-label="Personality quiz"><i class="ti ti-brain" style="font-size:18px"></i></button>
      <button class="add-btn" id="btn-add" aria-label="Add event">
        <i class="ti ti-plus" style="font-size:20px"></i>
      </button>
    </div>
    <div class="tabbar" role="tablist" id="tabbar"></div>
  </div>

  <div class="toggles-bar" id="toggles-bar" style="display:none"></div>

  <div class="cal-card">
    <div class="month-nav">
      <span class="month-label" id="month-label"></span>
      <div class="nav-btns">
        <button class="nav-arrow" id="btn-prev"><i class="ti ti-chevron-left"></i></button>
        <button class="today-pill" id="btn-today">Today</button>
        <button class="nav-arrow" id="btn-next"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="day-panel" id="day-panel" style="display:none">
    <div class="day-panel-header">
      <span class="day-panel-title" id="day-panel-title"></span>
      <button class="day-panel-add" id="btn-day-add">
        <i class="ti ti-plus" style="font-size:13px"></i> Add
      </button>
    </div>
    <div class="ev-list" id="day-ev-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" style="display:none">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-inner">
      <div class="modal-title" id="modal-title">New event</div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="f-title" placeholder="What's happening?" autocomplete="off" />
      </div>
      <div class="field field-row">
        <div>
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div>
          <label>Time</label>
          <input type="time" id="f-time" />
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <div class="cat-picker" id="cat-picker"></div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Optional details…"></textarea>
      </div>
      <button class="btn-save" id="btn-save">Save event</button>
      <div class="btn-delete-row"><button class="btn-delete" id="btn-delete" style="display:none">Delete event</button></div>
      <div class="btn-cancel-row"><button class="btn-cancel" id="btn-cancel">Cancel</button></div>
    </div>
  </div>
</div>

<!-- MBTI Quiz Overlay -->
<div class="mbti-overlay" id="mbti-overlay" style="display:none">
  <!-- Welcome Screen -->
  <div class="mbti-screen" id="mbti-s-welcome">
    <div class="mbti-welcome-body">
      <div class="mbti-w-icon">🧠</div>
      <div class="mbti-w-h">MBTIパーソナリティ診断</div>
      <p class="mbti-w-p">60問の質問に答えて、あなたの<br>性格タイプを診断しましょう。</p>
      <div id="mbti-w-status"></div>
      <div class="mbti-w-gap"></div>
      <button class="mbti-btn-primary" id="mbti-start-btn">診断を始める</button>
      <button class="mbti-btn-ghost" id="mbti-view-res-btn" style="display:none">前回の結果を見る</button>
      <button class="mbti-btn-ghost" onclick="closeMbti()">閉じる</button>
    </div>
  </div>

<script>
const CATS = {
  work:    { label:'Work',    color:'#185FA5', bg:'#dbeafe', text:'#1e40af' },
  private: { label:'Private', color:'#3B6D11', bg:'#dcfce7', text:'#166534' },
  kids:    { label:'Kids',    color:'#b45309', bg:'#fef3c7', text:'#92400e' },
};
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const today = new Date();
let state = {
  tab:      'all',
  year:     today.getFullYear(),
  month:    today.getMonth(),
  selected: toKey(today.getFullYear(), today.getMonth(), today.getDate()),
  events:   loadEvents(),
  toggles:  { work:true, private:true, kids:true },
  editing:  null,
};

function toKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey(){ return toKey(today.getFullYear(), today.getMonth(), today.getDate()); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function loadEvents(){ try{ return JSON.parse(localStorage.getItem('fc_events')||'[]'); }catch{ return[]; } }
function saveEvents(){ localStorage.setItem('fc_events', JSON.stringify(state.events)); }
function fmtTime(t){ if(!t)return''; const[h,m]=t.split(':').map(Number); return`${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`; }
function fmtDateNice(key){
  const[y,mo,d]=key.split('-').map(Number);
  return new Date(y,mo-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}

function visibleEvents(){
  let evs=state.events;
  if(state.tab!=='all') evs=evs.filter(e=>e.cat===state.tab);
  else evs=evs.filter(e=>state.toggles[e.cat]);
  return evs;
}
function eventsOnDay(key){ return visibleEvents().filter(e=>e.date===key).sort((a,b)=>(a.time||'99:99')<(b.time||'99:99')?-1:1); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function renderAll(){ renderTabs(); renderToggles(); renderMonthLabel(); renderGrid(); renderDayPanel(); }

function renderTabs(){
  const bar=document.getElementById('tabbar');
  const tabs=[{id:'all',label:'All'},{id:'work',label:'Work',color:CATS.work.color},{id:'private',label:'Private',color:CATS.private.color},{id:'kids',label:'Kids',color:CATS.kids.color}];
  bar.innerHTML=tabs.map(t=>`<button class="tab-btn${state.tab===t.id?' active':''}" data-tab="${t.id}">${t.color?`<span class="tab-dot" style="background:${t.color}"></span>`:''} ${t.label}</button>`).join('');
  bar.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{state.tab=b.dataset.tab;renderAll();}));
}

function renderToggles(){
  const bar=document.getElementById('toggles-bar');
  if(state.tab!=='all'){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML=Object.entries(CATS).map(([k,c])=>`
    <div class="toggle-pill${state.toggles[k]?'':' off'}" data-toggle="${k}"
         style="background:${state.toggles[k]?c.bg:'#f3f4f6'};border-color:${state.toggles[k]?c.color:'transparent'};color:${state.toggles[k]?c.text:'#9ca3af'}">
      <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block"></span>${c.label}
    </div>`).join('');
  bar.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>{
    state.toggles[el.dataset.toggle]=!state.toggles[el.dataset.toggle]; renderToggles(); renderGrid(); renderDayPanel();
  }));
}

function renderMonthLabel(){ document.getElementById('month-label').textContent=`${MONTHS[state.month]} ${state.year}`; }

function renderGrid(){
  const tKey=todayKey();
  const first=new Date(state.year,state.month,1);
  const startDay=first.getDay();
  const daysInMonth=new Date(state.year,state.month+1,0).getDate();
  const daysInPrev=new Date(state.year,state.month,0).getDate();

  function cell(y,m,d,other){
    const key=toKey(y,m,d);
    const evs=eventsOnDay(key);
    const isToday=key===tKey, isSel=key===state.selected;
    const dots=evs.slice(0,4).map(e=>`<div class="ev-dot" style="background:${CATS[e.cat].color}"></div>`).join('');
    return `<div class="cal-cell${other?' other-month':''}${isToday?' today':''}${isSel?' selected':''}" data-key="${key}">
      <div class="d-num">${d}</div>
      <div class="dot-row">${dots}</div>
    </div>`;
  }

  let html=DAYS.map(d=>`<div class="day-head">${d[0]}</div>`).join('');
  for(let i=0;i<startDay;i++){ const d=daysInPrev-startDay+1+i, pm=state.month===0?11:state.month-1, py=state.month===0?state.year-1:state.year; html+=cell(py,pm,d,true); }
  for(let d=1;d<=daysInMonth;d++) html+=cell(state.year,state.month,d,false);
  const rem=(startDay+daysInMonth)%7===0?0:7-(startDay+daysInMonth)%7;
  for(let d=1;d<=rem;d++){ const nm=state.month===11?0:state.month+1, ny=state.month===11?state.year+1:state.year; html+=cell(ny,nm,d,true); }

  const grid=document.getElementById('cal-grid');
  grid.innerHTML=html;
  grid.querySelectorAll('.cal-cell').forEach(el=>el.addEventListener('click',()=>{ state.selected=el.dataset.key; renderGrid(); renderDayPanel(); }));
}

function renderDayPanel(){
  const panel=document.getElementById('day-panel');
  if(!state.selected){ panel.style.display='none'; return; }
  panel.style.display='';
  document.getElementById('day-panel-title').textContent=fmtDateNice(state.selected);
  const evs=eventsOnDay(state.selected);
  const list=document.getElementById('day-ev-list');
  if(evs.length===0){
    list.innerHTML=`<div class="no-events"><i class="ti ti-calendar-off"></i>No events — tap Add to create one</div>`;
  } else {
    list.innerHTML=evs.map(e=>{
      const c=CATS[e.cat];
      return `<div class="ev-row" data-ev="${e.id}">
        <div class="ev-bar" style="background:${c.color}"></div>
        <div class="ev-info">
          <div class="ev-title">${e.title}</div>
          <div class="ev-meta">${e.time?fmtTime(e.time):'All day'}${e.notes?' · '+e.notes:''}</div>
          <span class="ev-badge" style="background:${c.bg};color:${c.text}">${c.label}</span>
        </div>
        <i class="ti ti-chevron-right" style="color:#d1d5db;font-size:16px;align-self:center"></i>
      </div>`;
    }).join('');
    list.querySelectorAll('[data-ev]').forEach(row=>row.addEventListener('click',()=>{
      const ev=state.events.find(e=>e.id===row.dataset.ev);
      if(ev) openModal(ev);
    }));
  }
}

function openModal(ev, dateKey){
  state.editing=ev?ev.id:null;
  document.getElementById('modal-title').textContent=ev?'Edit event':'New event';
  document.getElementById('f-title').value=ev?ev.title:'';
  document.getElementById('f-date').value=ev?ev.date:(dateKey||state.selected||todayKey());
  document.getElementById('f-time').value=ev?(ev.time||''):'';
  document.getElementById('f-notes').value=ev?(ev.notes||''):'';
  document.getElementById('btn-save').textContent=ev?'Save changes':'Save event';
  document.getElementById('btn-delete').style.display=ev?'':'none';
  if(ev) document.getElementById('btn-delete').dataset.id=ev.id;
  buildCatPicker(ev?ev.cat:(state.tab==='all'?'work':state.tab));
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}

function buildCatPicker(selected){
  const p=document.getElementById('cat-picker');
  p.innerHTML=Object.entries(CATS).map(([k,c])=>`
    <button class="cat-option${selected===k?' sel-'+k:''}" data-cat="${k}" type="button">
      <div class="cat-dot" style="background:${c.color}"></div>
      <div class="cat-name">${c.label}</div>
    </button>`).join('');
  p.querySelectorAll('.cat-option').forEach(b=>b.addEventListener('click',()=>{
    p.querySelectorAll('.cat-option').forEach(x=>x.className='cat-option');
    b.className=`cat-option sel-${b.dataset.cat}`;
  }));
}

function closeModal(){ document.getElementById('overlay').style.display='none'; state.editing=null; }

function saveModal(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const notes=document.getElementById('f-notes').value.trim();
  const catBtn=document.querySelector('.cat-option[class*="sel-"]');
  const cat=catBtn?catBtn.dataset.cat:'work';
  if(!title){ document.getElementById('f-title').focus(); return; }
  if(!date) return;
  if(state.editing){
    state.events=state.events.map(e=>e.id===state.editing?{...e,title,date,time,cat,notes}:e);
    showToast('Event updated');
  } else {
    state.events.push({id:uid(),title,date,time,cat,notes});
    showToast('Event added ✓');
  }
  state.selected=date;
  saveEvents(); closeModal(); renderAll();
}

function deleteEvent(id){
  if(!confirm('Delete this event?')) return;
  state.events=state.events.filter(e=>e.id!==id);
  saveEvents(); closeModal(); renderAll();
  showToast('Deleted');
}

function seed(){
  if(state.events.length>0) return;
  const y=today.getFullYear(), m=today.getMonth();
  const safe=d=>Math.min(d, new Date(y,m+1,0).getDate());
  state.events=[
    {id:uid(),title:'Team standup',     date:toKey(y,m,safe(3)),  time:'09:00',cat:'work',    notes:'Daily check-in'},
    {id:uid(),title:'Project review',   date:toKey(y,m,safe(10)), time:'14:00',cat:'work',    notes:''},
    {id:uid(),title:'Dentist',          date:toKey(y,m,safe(7)),  time:'11:30',cat:'private', notes:'Annual check-up'},
    {id:uid(),title:'Dinner w/ friends',date:toKey(y,m,safe(15)), time:'19:00',cat:'private', notes:''},
    {id:uid(),title:'Soccer game',      date:toKey(y,m,safe(8)),  time:'10:00',cat:'kids',    notes:'Bring snacks!'},
    {id:uid(),title:'School play',      date:toKey(y,m,safe(20)), time:'18:30',cat:'kids',    notes:'Arrive early'},
  ];
  saveEvents();
}

document.getElementById('btn-prev').addEventListener('click',()=>{ state.month--; if(state.month<0){state.month=11;state.year--;} renderMonthLabel(); renderGrid(); });
document.getElementById('btn-next').addEventListener('click',()=>{ state.month++; if(state.month>11){state.month=0;state.year++;} renderMonthLabel(); renderGrid(); });
document.getElementById('btn-today').addEventListener('click',()=>{ state.year=today.getFullYear(); state.month=today.getMonth(); state.selected=todayKey(); renderMonthLabel(); renderGrid(); renderDayPanel(); });
document.getElementById('btn-add').addEventListener('click',()=>openModal(null));
document.getElementById('btn-day-add').addEventListener('click',()=>openModal(null, state.selected));
document.getElementById('btn-save').addEventListener('click',saveModal);
document.getElementById('btn-cancel').addEventListener('click',closeModal);
document.getElementById('btn-delete').addEventListener('click',e=>deleteEvent(e.currentTarget.dataset.id));
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

seed();
renderAll();

let mbti = { phase:'welcome', cur:0, ans:{} };
let mbtiAdvancing = false;

function openMbti(){
  let savedRes=null, savedProg=null;
  try{ savedRes=JSON.parse(localStorage.getItem('mbti_result')||'null'); }catch(e){}
  try{ savedProg=JSON.parse(localStorage.getItem('mbti_progress')||'null'); }catch(e){}

  const statusEl=document.getElementById('mbti-w-status');
  const viewBtn=document.getElementById('mbti-view-res-btn');
  const startBtn=document.getElementById('mbti-start-btn');

  if(savedRes){
    const info=MBTI_INFO[savedRes.type]||{};
    statusEl.innerHTML=`<span class="mbti-w-resume">前回の診断：<strong>${savedRes.type}</strong>（${info.name||''}）</span>`;
    viewBtn.style.display='';
    startBtn.textContent='やり直す';
    viewBtn.onclick=()=>{
      mbti={phase:'result',cur:0,ans:savedRes.answers||{},type:savedRes.type,pct:savedRes.pct};
      showMbtiScreen('result'); renderMbtiResult();
    };
    startBtn.onclick=()=>{
      mbti={phase:'quiz',cur:0,ans:{}}; mbtiAdvancing=false;
      localStorage.removeItem('mbti_result'); localStorage.removeItem('mbti_progress');
      showMbtiScreen('quiz'); renderMbtiQ();
    };
  } else if(savedProg && Object.keys(savedProg.ans||{}).length>0){
    const done=Object.keys(savedProg.ans).length;
    statusEl.innerHTML=`<span class="mbti-w-resume">${done}問まで回答済み</span>`;
    viewBtn.style.display='none';
    startBtn.textContent='続きから始める';
    mbti={phase:'welcome',cur:savedProg.cur||0,ans:savedProg.ans||{}};
    startBtn.onclick=()=>{ mbti.phase='quiz'; showMbtiScreen('quiz'); renderMbtiQ(); };
  } else {
    statusEl.innerHTML='';
    viewBtn.style.display='none';
    startBtn.textContent='診断を始める';
    mbti={phase:'welcome',cur:0,ans:{}};
    startBtn.onclick=()=>{ mbti.phase='quiz'; showMbtiScreen('quiz'); renderMbtiQ(); };
  }

  showMbtiScreen('welcome');
  document.getElementById('mbti-overlay').style.display='flex';
}

function closeMbti(){ document.getElementById('mbti-overlay').style.display='none'; }

function showMbtiScreen(which){
  ['welcome','quiz','result'].forEach(s=>{
    const el=document.getElementById('mbti-s-'+s);
    el.style.display = s===which ? 'flex' : 'none';
  });
}

function renderMbtiQ(){
  const q=MBTI_Q[mbti.cur], total=MBTI_Q.length;
  document.getElementById('mbti-prog-f').style.width=(mbti.cur/total*100).toFixed(1)+'%';
  document.getElementById('mbti-cnt').textContent=`${mbti.cur+1}/${total}`;
  document.getElementById('mbti-q-lbl').textContent=`質問 ${mbti.cur+1}`;
  document.getElementById('mbti-q-txt').textContent=q.text;
  const ans=mbti.ans[q.id];
  document.getElementById('mbti-scale-row').innerHTML=[1,2,3,4,5].map(v=>
    `<button class="mbti-s-btn${ans===v?' sel':''}" onclick="setMbtiAns(${v})">${v}</button>`
  ).join('');
  document.getElementById('mbti-prev').disabled=(mbti.cur===0);
  document.getElementById('mbti-next').textContent=mbti.cur===total-1?'結果を見る ✓':'次へ →';
  const body=document.getElementById('mbti-q-body');
  body.classList.remove('mbti-q-anim');
  void body.offsetWidth;
  body.classList.add('mbti-q-anim');
}

function setMbtiAns(v){
  if(mbtiAdvancing) return;
  const q=MBTI_Q[mbti.cur];
  mbti.ans[q.id]=v;
  document.querySelectorAll('.mbti-s-btn').forEach(b=>{
    b.classList.toggle('sel',parseInt(b.textContent)===v);
  });
  saveMbtiProgress();
  const isLast=mbti.cur===MBTI_Q.length-1;
  mbtiAdvancing=true;
  setTimeout(()=>{
    mbtiAdvancing=false;
    if(isLast) calcAndShowResult();
    else { mbti.cur++; renderMbtiQ(); }
  },350);
}

function mbtiPrev(){ if(mbtiAdvancing)return; if(mbti.cur>0){mbti.cur--;renderMbtiQ();} }
function mbtiNext(){
  if(mbtiAdvancing)return;
  if(mbti.cur===MBTI_Q.length-1) calcAndShowResult();
  else { mbti.cur++; renderMbtiQ(); }
}

function saveMbtiProgress(){
  try{ localStorage.setItem('mbti_progress',JSON.stringify({cur:mbti.cur,ans:mbti.ans})); }catch(e){}
}

function calcAndShowResult(){
  const sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, cnt={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  MBTI_Q.forEach(q=>{ const a=mbti.ans[q.id]||3; sc[q.axis]+=a; cnt[q.axis]++; });
  const pct={};
  'EISNTFJP'.split('').forEach(k=>{ pct[k]=cnt[k]>0?sc[k]/(5*cnt[k])*100:50; });
  const type=[pct.E>=pct.I?'E':'I',pct.S>=pct.N?'S':'N',pct.T>=pct.F?'T':'F',pct.J>=pct.P?'J':'P'].join('');
  mbti.type=type; mbti.pct=pct;
  try{
    localStorage.setItem('mbti_result',JSON.stringify({type,pct,answers:mbti.ans}));
    localStorage.removeItem('mbti_progress');
  }catch(e){}
  showMbtiScreen('result');
  renderMbtiResult();
}

function renderMbtiResult(){
  const{type,pct}=mbti;
  const info=MBTI_INFO[type]||{name:type,desc:'',strengths:[],weaknesses:[],relationships:'',jobs:[]};
  document.getElementById('mbti-t4').textContent=type;
  document.getElementById('mbti-tnm').textContent=info.name;
  document.getElementById('mbti-ttl').textContent=info.desc;
  const mkTags=(arr,cls)=>arr.map(t=>`<span class="mbti-tag ${cls}">${t}</span>`).join('');
  document.getElementById('mbti-strengths').innerHTML=mkTags(info.strengths||[],'str');
  document.getElementById('mbti-weaknesses').innerHTML=mkTags(info.weaknesses||[],'wkn');
  document.getElementById('mbti-relationships').textContent=info.relationships||'';
  document.getElementById('mbti-jobs').innerHTML=mkTags(info.jobs||[],'job');
  const dims=[
    {l:'E',r:'I',ll:'外向型 (E)',rl:'内向型 (I)'},
    {l:'S',r:'N',ll:'感覚型 (S)',rl:'直観型 (N)'},
    {l:'T',r:'F',ll:'思考型 (T)',rl:'感情型 (F)'},
    {l:'J',r:'P',ll:'判断型 (J)',rl:'知覚型 (P)'},
  ];
  const dimsEl=document.getElementById('mbti-dims');
  dimsEl.innerHTML='';
  dims.forEach(d=>{
    const lp=pct[d.l],rp=pct[d.r],tot=lp+rp,fp=tot>0?lp/tot*100:50;
    const wl=fp>=50;
    dimsEl.innerHTML+=`<div class="mbti-dim">
      <div class="mbti-dim-hd">
        <span class="mbti-dim-lbl${wl?' w':''}">${d.ll}</span>
        <span class="mbti-dim-lbl${!wl?' w':''}">${d.rl}</span>
      </div>
      <div class="mbti-dim-bar"><div class="mbti-dim-bar-f" style="width:0%" data-w="${fp.toFixed(1)}"></div></div>
      <div class="mbti-dim-pcts"><span>${lp.toFixed(0)}%</span><span>${rp.toFixed(0)}%</span></div>
    </div>`;
  });
  document.getElementById('mbti-retake').onclick=()=>{
    mbti={phase:'quiz',cur:0,ans:{}}; mbtiAdvancing=false;
    localStorage.removeItem('mbti_result'); localStorage.removeItem('mbti_progress');
    showMbtiScreen('quiz'); renderMbtiQ();
  };
  // Animate bars after paint
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.mbti-dim-bar-f').forEach(el=>{
      el.style.width=el.dataset.w+'%';
    });
  }));
}

document.getElementById('btn-mbti').addEventListener('click', openMbti);
document.getElementById('mbti-prev').addEventListener('click', mbtiPrev);
document.getElementById('mbti-next').addEventListener('click', mbtiNext);
</script>
